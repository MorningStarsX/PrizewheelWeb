# .github/workflows/deploy-static.yml
name: Deploy Static Web to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 设置 Node.js 
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 3. 检查 web 文件夹是否存在
      - name: Check web folder
        run: |
          if [ ! -d "web" ]; then
            echo "Error: 'web' folder not found!"
            echo "Please make sure your web files are in the 'web' directory."
            exit 1
          fi
          echo "Found web folder with contents:"
          ls -la web/
          
      # 4. 设置 Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      # 5. 上传 web 文件夹作为构建产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web/
          
      # 6. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
